services:
  - type: web
    name: rag-doc-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
