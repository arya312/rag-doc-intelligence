services:
  - type: web
    name: rag-doc-intelligence
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm install
      npm run build
    startCommand: bash -lc 'python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000} --timeout-keep-alive 120'
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: /data/chroma_db
